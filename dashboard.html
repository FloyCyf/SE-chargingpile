<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能充电桩管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }
        
        .card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }
        
        .stat-card {
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
        
        .status-free {
            background-color: #E8F5E9;
            color: #2E7D32;
        }
        
        .status-charging {
            background-color: #E3F2FD;
            color: #1565C0;
        }
        
        .status-fault {
            background-color: #FFEBEE;
            color: #C62828;
        }
        
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-fast {
            background-color: #FFF7ED;
            color: #EA580C;
        }

        .badge-slow {
            background-color: #EFF6FF;
            color: #2563EB;
        }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold text-gray-800">智能充电桩管理系统</h1>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <!-- 统计概览 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="card bg-white rounded-lg p-4 stat-card">
                <div class="text-sm text-gray-500 mb-1">空闲桩数</div>
                <div class="flex items-baseline space-x-2">
                    <div class="text-2xl font-bold text-green-500" id="free-piles">2</div>
                    <div class="text-xs text-gray-400">
                        <span class="text-orange-500">快充<span id="fast-free">1</span></span> / 
                        <span class="text-blue-500">慢充<span id="slow-free">1</span></span>
                    </div>
                </div>
            </div>
            <div class="card bg-white rounded-lg p-4 stat-card">
                <div class="text-sm text-gray-500 mb-1">充电中桩数</div>
                <div class="flex items-baseline space-x-2">
                    <div class="text-2xl font-bold text-blue-500" id="charging-piles">3</div>
                    <div class="text-xs text-gray-400">
                        <span class="text-orange-500">快充<span id="fast-charging">2</span></span> / 
                        <span class="text-blue-500">慢充<span id="slow-charging">1</span></span>
                    </div>
                </div>
            </div>
            <div class="card bg-white rounded-lg p-4 stat-card">
                <div class="text-sm text-gray-500 mb-1">故障桩数</div>
                <div class="flex items-baseline space-x-2">
                    <div class="text-2xl font-bold text-red-500" id="fault-piles">0</div>
                    <div class="text-xs text-gray-400">
                        <span class="text-orange-500">快充<span id="fast-fault">0</span></span> / 
                        <span class="text-blue-500">慢充<span id="slow-fault">0</span></span>
                    </div>
                </div>
            </div>
            <div class="card bg-white rounded-lg p-4 stat-card">
                <div class="text-sm text-gray-500 mb-1">今日充电次数</div>
                <div class="flex items-baseline space-x-2">
                    <div class="text-2xl font-bold text-purple-500" id="today-count">28</div>
                    <div class="text-xs text-gray-400">
                        <span class="text-orange-500">快充<span id="fast-today-count">18</span></span> / 
                        <span class="text-blue-500">慢充<span id="slow-today-count">10</span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计概览第二行 -->
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
            <div class="card bg-white rounded-lg p-4 stat-card">
                <div class="text-sm text-gray-500 mb-1">今日电量</div>
                <div class="text-2xl font-bold text-orange-500" id="today-electricity">125度</div>
            </div>
            <div class="card bg-white rounded-lg p-4 stat-card">
                <div class="text-sm text-gray-500 mb-1">今日收益</div>
                <div class="text-2xl font-bold text-cyan-500" id="today-revenue">¥1,280</div>
            </div>
            <div class="card bg-white rounded-lg p-4 stat-card">
                <div class="text-sm text-gray-500 mb-1">总充电桩</div>
                <div class="text-2xl font-bold text-gray-800" id="total-piles">5</div>
            </div>
        </div>

        <!-- 充电桩状态 -->
        <div class="card bg-white rounded-lg p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">⚡ 充电桩状态</h2>
            <div id="pile-status" class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <!-- 充电桩状态将通过JS注入 -->
            </div>
        </div>

        <!-- 排队车辆信息 -->
        <div class="card bg-white rounded-lg p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">🚗 排队车辆信息</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">排队号</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">用户ID</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">请求充电量</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">排队时长</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">排队状态</th>
                        </tr>
                    </thead>
                    <tbody id="queue-list">
                        <!-- 排队车辆信息将通过JS注入 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 数据图表 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card bg-white rounded-lg p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">📊 日用电量趋势</h2>
                <div class="h-64">
                    <canvas id="electricity-chart"></canvas>
                </div>
            </div>
            <div class="card bg-white rounded-lg p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">📈 日收益趋势</h2>
                <div class="h-64">
                    <canvas id="revenue-chart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            return `${hours}h ${minutes}m`;
        }

        async function fetchPileStatus() {
            try {
                const response = await axios.get('http://10.255.43.112:8000/api/admin/pile/status');
                const piles = response.data;
                
                let pileHtml = '';
                let freeCount = 0, chargingCount = 0, faultCount = 0;
                let fastFree = 0, fastCharging = 0, fastFault = 0;
                let slowFree = 0, slowCharging = 0, slowFault = 0;
                
                piles.forEach(pile => {
                    const isFast = pile.pile_id.startsWith('P001') || pile.pile_id.startsWith('P002') || pile.pile_id.startsWith('P003');
                    
                    if (pile.status === '空闲') {
                        freeCount++;
                        if (isFast) fastFree++;
                        else slowFree++;
                    }
                    if (pile.status === '充电中') {
                        chargingCount++;
                        if (isFast) fastCharging++;
                        else slowCharging++;
                    }
                    if (pile.status === '故障') {
                        faultCount++;
                        if (isFast) fastFault++;
                        else slowFault++;
                    }
                    
                    pileHtml += `
                        <div class="flex flex-col items-center p-3 border rounded-lg ${pile.status === '空闲' ? 'border-green-200 bg-green-50' : pile.status === '充电中' ? 'border-blue-200 bg-blue-50' : 'border-red-200 bg-red-50'}">
                            <span class="font-medium text-gray-800 mb-2">${pile.pile_id}</span>
                            <span class="badge ${pile.status === '空闲' ? 'status-free' : pile.status === '充电中' ? 'status-charging' : 'status-fault'} mb-2">
                                ${pile.status}
                            </span>
                            <span class="text-xs ${isFast ? 'text-orange-500' : 'text-blue-500'}">${isFast ? '快充' : '慢充'}</span>
                        </div>
                    `;
                });
                
                document.getElementById('pile-status').innerHTML = pileHtml;
                document.getElementById('free-piles').textContent = freeCount;
                document.getElementById('charging-piles').textContent = chargingCount;
                document.getElementById('fault-piles').textContent = faultCount;
                document.getElementById('total-piles').textContent = piles.length;
                
                document.getElementById('fast-free').textContent = fastFree;
                document.getElementById('slow-free').textContent = slowFree;
                document.getElementById('fast-charging').textContent = fastCharging;
                document.getElementById('slow-charging').textContent = slowCharging;
                document.getElementById('fast-fault').textContent = fastFault;
                document.getElementById('slow-fault').textContent = slowFault;
            } catch (error) {
                console.error('Error fetching pile status:', error);
            }
        }

        async function fetchQueueList() {
            try {
                const response = await axios.get('http://10.255.43.112:8000/api/admin/queue/list');
                const queue = response.data;
                
                let html = '';
                queue.forEach(item => {
                    html += `
                        <tr class="border-b">
                            <td class="px-4 py-3 text-sm">${item.queue_id}</td>
                            <td class="px-4 py-3 text-sm">${item.user_id}</td>
                            <td class="px-4 py-3 text-sm">${item.requested_capacity}度</td>
                            <td class="px-4 py-3 text-sm">${formatDuration(item.queue_duration)}</td>
                            <td class="px-4 py-3">
                                <span class="badge ${item.status === '排队中' ? 'status-charging' : 'status-free'}">
                                    ${item.status}
                                </span>
                            </td>
                        </tr>
                    `;
                });
                
                document.getElementById('queue-list').innerHTML = html || '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">暂无排队车辆</td></tr>';
            } catch (error) {
                console.error('Error fetching queue list:', error);
            }
        }

        async function fetchStatistics() {
            try {
                const response = await axios.get('http://10.255.43.112:8000/api/admin/pile/statistics');
                const stats = response.data;
                
                document.getElementById('today-count').textContent = stats.today_charging_count;
                document.getElementById('today-electricity').textContent = stats.today_electricity + '度';
                document.getElementById('today-revenue').textContent = '¥' + stats.today_revenue.toLocaleString();
            } catch (error) {
                console.error('Error fetching statistics:', error);
            }
        }

        function initCharts() {
            const labels = ['1月', '2月', '3月', '4月', '5月', '6月'];
            const electricityData = [120, 190, 300, 500, 200, 300];
            const revenueData = [1000, 1500, 2500, 4000, 1800, 2800];

            const electricityCtx = document.getElementById('electricity-chart').getContext('2d');
            new Chart(electricityCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '用电量 (kWh)',
                        data: electricityData,
                        borderColor: '#165DFF',
                        backgroundColor: 'rgba(22, 93, 255, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            const revenueCtx = document.getElementById('revenue-chart').getContext('2d');
            new Chart(revenueCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '收益 (元)',
                        data: revenueData,
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        async function loadData() {
            await fetchPileStatus();
            await fetchQueueList();
            await fetchStatistics();
        }

        window.onload = function() {
            initCharts();
            loadData();
            setInterval(loadData, 3000);
        };
    </script>
</body>
</html>
