# 智能充电桩系统配置
system:
  fast_pile_count: 3
  slow_pile_count: 2
  waiting_area_size: 10
  pile_queue_length: 3   # 每桩总车位数（1充电位+2排队位），验收标准值
  # 向后兼容旧键名
  fast_charging_piles: 3
  slow_charging_piles: 2
  waiting_area_capacity: 10

simulation:
  virtual_minutes_per_real_second: 1
  fast_charge_percent_per_min: 0.01
  slow_charge_percent_per_min: 0.005

charging:
  fast_power: 30.0
  slow_power: 10.0

billing:
  battery_capacity_kwh: 60.0
  peak_rate: 1.0
  flat_rate: 0.7
  valley_rate: 0.4
  service_fee_rate: 0.8
  peak_hours: [[10, 15], [18, 21]]
  flat_hours: [[7, 10], [15, 18], [21, 23]]
  valley_hours: [[23, 24], [0, 7]]

# 动态优先级调度权重
# P_i = alpha * (1 - SOC_i) + beta * W_type + gamma * ln(t_wait_i + 1)
priority:
  alpha: 0.5          # 低电量权重（SOC越低优先级越高）
  beta: 0.3           # 充电模式权重
  gamma: 0.2          # 等待时间权重
  fast_type_weight: 1.0   # 快充模式 W_type
  slow_type_weight: 0.5   # 慢充模式 W_type
